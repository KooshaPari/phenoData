name: CodeQL (Rust)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 4 * * 2'
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze (rust)
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Initialize CodeQL
        uses: github/codeql-action/init@c15bbf03b9a44c4c82ae160f148208819ad7f737 # v3
        with:
          languages: rust
      - name: Autobuild
        uses: github/codeql-action/autobuild@fee9466b8957867761f2d78f922ab084e3e2dd17
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@c15bbf03b9a44c4c82ae160f148208819ad7f737 # v3
        with:
          category: "/language:rust"
