name: Quality Gate
on:
  workflow_dispatch:

permissions:
  contents: read

on: [push, pull_request]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # v-latest
      - run: |
          if [ ! -f tooling/quality-gate ]; then
            mkdir -p tooling
            if [ -d phenotype-tooling ]; then
              cd phenotype-tooling && cargo build --release --bin quality-gate 2>&1 | tail -5
              ln -sf ../phenotype-tooling/target/release/quality-gate ../tooling/
            else
              echo "Note: quality-gate not available; skipping" && exit 0
            fi
          fi
          tooling/quality-gate --quick || true
