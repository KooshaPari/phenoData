name: cargo-audit

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['Cargo.lock', 'Cargo.toml']
  pull_request:
    paths: ['Cargo.lock', 'Cargo.toml']
  schedule:
    - cron: '37 5 * * 3'  # weekly Wednesday
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998
        with:
          token: ${{ github.token }}
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

