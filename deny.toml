[graph]
all-features = false

[licenses]
allow = ["MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception", "BSD-2-Clause", "BSD-3-Clause", "ISC", "Unicode-DFS-2016", "MPL-2.0", "0BSD", "CC0-1.0"]

[advisories]
ignore = [
    { id = "RUSTSEC-2023-0071", reason = "RSA Marvin Attack (RUSTSEC-2023-0071) affects the rsa crate. No safe upgrade path exists as of 2023. The vulnerability is inherited via the jsonwebtoken -> surrealdb-core dependency chain in this project; remediation awaits an upstream safe RSA implementation." },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
