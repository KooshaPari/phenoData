[graph]
all-features = false

[licenses]
allow = [ "MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception", "BSD-2-Clause", "BSD-3-Clause", "ISC", "Unicode-DFS-2016", "MPL-2.0", "0BSD", "CC0-1.0", "Unlicense", "Unicode-3.0", "CDLA-Permissive-2.0", "Zlib" ]

[advisories]
ignore = [
    # expires: 2027-05-05 — re-evaluate when rsa crate ships constant-time fix
    { id = "RUSTSEC-2023-0071", reason = "RSA Marvin Attack timing side-channel inherited via jsonwebtoken -> surrealdb-core; no safe RSA upgrade path exists as the rsa crate's fully constant-time fix is still in progress upstream; workaround is to avoid RSA-based JWT algorithms in threat-exposed settings" },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
unknown-registry = "warn"
unknown-git = "warn"
