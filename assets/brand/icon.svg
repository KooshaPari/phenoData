<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="phenoData — phenotype data DNA">
  <defs>
    <linearGradient id="pd-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1116"/>
      <stop offset="1" stop-color="#090a0c"/>
    </linearGradient>
    <linearGradient id="pd-frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2228"/>
      <stop offset="1" stop-color="#0a0d11"/>
    </linearGradient>
    <linearGradient id="pd-strand1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7ebab5"/>
      <stop offset="0.5" stop-color="#a7d4cf"/>
      <stop offset="1" stop-color="#7ebab5"/>
    </linearGradient>
    <linearGradient id="pd-strand2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3a8d87"/>
      <stop offset="0.5" stop-color="#1a4240"/>
      <stop offset="1" stop-color="#3a8d87"/>
    </linearGradient>
    <radialGradient id="pd-glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#7ebab5" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#7ebab5" stop-opacity="0"/>
    </radialGradient>
    <filter id="pd-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <filter id="pd-glow-fx" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#pd-bg)"/>
  <circle cx="256" cy="256" r="220" fill="url(#pd-glow)"/>

  <!-- hexagonal outer frame -->
  <g filter="url(#pd-shadow)">
    <polygon points="256,72 408,160 408,352 256,440 104,352 104,160"
             fill="url(#pd-frame)" stroke="#7ebab5" stroke-opacity="0.45" stroke-width="2.5"/>
  </g>

  <!-- inner panel -->
  <polygon points="256,108 376,178 376,334 256,404 136,334 136,178"
           fill="#060809" fill-opacity="0.5" stroke="#7ebab5" stroke-opacity="0.18" stroke-width="1"/>

  <!-- DNA helix — two sine waves interlocking -->
  <g transform="translate(256 256)">
    <!-- strand 1 (teal, top-curve) -->
    <path d="M -120 -160 Q -60 -120 0 -80 Q 60 -40 0 0 Q -60 40 -120 0 Q -60 -40 0 -80 Q 60 -120 -120 -160 Z"
          fill="none" opacity="0"/>
    <!-- We'll author two proper sine-style strands via cubic curves -->

    <!-- strand A: light teal -->
    <path d="M -120 -150
             C -90 -110, -90 -90, -60 -50
             C -30 -10, -30  10, -60  50
             C -90  90, -90 110, -120 150"
          fill="none" stroke="url(#pd-strand1)" stroke-width="10" stroke-linecap="round"/>
    <!-- mirrored strand A bottom -->
    <path d="M 120 -150
             C 90 -110, 90 -90, 60 -50
             C 30 -10, 30  10, 60  50
             C 90  90, 90 110, 120 150"
          fill="none" stroke="url(#pd-strand1)" stroke-width="10" stroke-linecap="round"/>

    <!-- strand B: dark teal — interlaced -->
    <path d="M 120 -150
             C 90 -110, 90 -90, 60 -50
             C 30 -10, 30  10, 60  50
             C 90  90, 90 110, 120 150
             M -120 -150
             C -90 -110, -90 -90, -60 -50
             C -30 -10, -30  10, -60  50
             C -90  90, -90 110, -120 150"
          fill="none" stroke="url(#pd-strand2)" stroke-width="10" stroke-linecap="round" transform="scale(-1 1) translate(0 0)"/>

    <!-- node dots at crossings (every 30 deg) -->
    <g fill="#7ebab5">
      <circle cx="-100" cy="-130" r="5"/>
      <circle cx="-60"  cy="-80"  r="5"/>
      <circle cx="-100" cy="-30"  r="5"/>
      <circle cx="-60"  cy="20"   r="5"/>
      <circle cx="-100" cy="70"   r="5"/>
      <circle cx="-60"  cy="120"  r="5"/>
      <circle cx="100"  cy="-130" r="5"/>
      <circle cx="60"   cy="-80"  r="5"/>
      <circle cx="100"  cy="-30"  r="5"/>
      <circle cx="60"   cy="20"   r="5"/>
      <circle cx="100"  cy="70"   r="5"/>
      <circle cx="60"   cy="120"  r="5"/>
    </g>
  </g>

  <!-- glow halo on helix center -->
  <circle cx="256" cy="256" r="80" fill="#7ebab5" fill-opacity="0.05" filter="url(#pd-glow-fx)"/>

  <!-- top/bottom caps -->
  <g fill="#7ebab5">
    <circle cx="136" cy="106" r="4" opacity="0.7"/>
    <circle cx="376" cy="106" r="4" opacity="0.7"/>
    <circle cx="136" cy="406" r="4" opacity="0.7"/>
    <circle cx="376" cy="406" r="4" opacity="0.7"/>
  </g>
</svg>